<html>
<head>
</head>
<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:#121212;" id="game_frame">
    <div style="margin:0px;width:100%;height:100%;font-family:sans-serif;display:flex;align-items:center;user-select:none;" id="launch_countdown_screen">
        <div style="margin:auto;text-align:center;color:#FFFFFF;">
            <h1><span style="color:#FF5555;">Stolen By Jon Stearns</span></h1>
            <h2>Loading, Time Remaining  <span id="launchCountdownNumber">5</span>...</h2>
            <div style="border:2px solid #FFFFFF;width:400px;height:15px;padding:1px;margin:20px auto;">
                <div id="launchCountdownProgress" style="background-color:#555555;width:0%;height:100%;transition:width 0.055s linear;"></div>
            </div>
            <button id="skipCountdown" autofocus style="padding:10px 20px;font-size:1rem;color:#FFFFFF;background-color:#333333;border:none;cursor:pointer;border-radius:5px;">Skip</button>
        </div>
    </div>

    <script>
        let countdown = 5;
        let progress = -5;
        const countdownElement = document.getElementById('launchCountdownNumber');
        const progressBar = document.getElementById('launchCountdownProgress');
        const skipButton = document.getElementById('skipCountdown');
        const launchScreen = document.getElementById('launch_countdown_screen');

        function updateCountdown() {
            countdownElement.textContent = countdown;
        }

        function updateProgress() {
            progress += 2;
            progressBar.style.width = progress + '%';
            
            if (progress >= 100) {
                clearInterval(progressInterval);
                clearInterval(countdownInterval);
                launchGame();
            }
        }

        function launchGame() {
            window.location.href = 'game.html';
        }

        // Update countdown every second
        const countdownInterval = setInterval(() => {
            countdown--;
            if (countdown < 0) {
                countdown = 0;
                clearInterval(countdownInterval);
            }
            updateCountdown();
        }, 1000);

        // Update progress bar smoothly (50 times over 5 seconds = 100ms per update)
        const progressInterval = setInterval(() => {
            updateProgress();
        }, 100);

        // Skip button functionality
        skipButton.addEventListener('click', () => {
            clearInterval(countdownInterval);
            clearInterval(progressInterval);
            launchGame();
        });

        // Also allow Enter key to skip
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                clearInterval(countdownInterval);
                clearInterval(progressInterval);
                launchGame();
            }
        });
    </script>
</body>
</html>
